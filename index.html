<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Velocity Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="velocityTracker()" x-init="fetchData()" x-cloak>

    <!-- Shared Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="index.html" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="index.html" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Home</a>
                 <a href="/products" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Products</a>
                 <a href="index.html" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Preorder</a>
                 <a href="velocity.html" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Velocity</a>
            </div>
            <div class="hidden md:block">
                <span class="text-[10px] font-black uppercase text-blue-600">May 2026 Live Market Insights</span>
            </div>
        </div>
    </nav>

    <!-- Tool Header -->
    <div class="bg-white border-b border-gray-200 pt-8 pb-6 px-4">
        <div class="container mx-auto text-center">
            <div class="inline-flex items-center justify-center space-x-2 bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-3 border border-red-100">
                <div class="w-2 h-2 rounded-full bg-red-500 pulse-slow"></div>
                <span>Hourly Pulse: TCG API Data</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter text-slate-900 mb-2">Hype <span class="text-blue-600">Velocity</span></h1>
            <p class="text-xs md:text-sm text-gray-500 font-medium">Factual tracking of the newest Pokémon sets based on market density and release proximity.</p>
        </div>
    </div>

    <!-- Dashboard -->
    <main class="container mx-auto py-8 px-2 md:px-4">
        <div x-show="loading" class="text-center py-20 font-black text-blue-600 animate-pulse uppercase tracking-widest">Gathering Market Facts...</div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" x-show="!loading">
            <template x-for="(set, index) in trendingSets" :key="set.id">
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-xl transition-all relative">
                    <!-- Rank -->
                    <div class="absolute top-0 left-0 w-10 h-10 flex items-center justify-center font-black text-white text-lg rounded-br-2xl z-10"
                         :class="index === 0 ? 'bg-red-500' : 'bg-slate-900'">
                        #<span x-text="index + 1"></span>
                    </div>

                    <div class="p-6 pt-10">
                        <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest" x-text="set.series"></span>
                        <h2 class="text-lg font-black uppercase text-slate-900 mb-4" x-text="set.name"></h2>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Velocity Index</p>
                                <p class="text-2xl font-black text-blue-600"><span x-text="set.hypeScore"></span>/100</p>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Trend Status</p>
                                <p class="text-xl font-black" :class="set.hypeScore > 85 ? 'text-red-500' : 'text-slate-900'">
                                    <i class="fas fa-fire-alt mr-1"></i> <span x-text="set.hypeScore > 85 ? 'HITTING' : 'ACTIVE'"></span>
                                </p>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex justify-between text-[8px] font-black text-gray-400 uppercase">
                                <span>Collection Rate</span>
                                <span x-text="set.total + ' Cards'"></span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                                <div class="bg-blue-600 h-full transition-all duration-1000" :style="'width: ' + set.hypeScore + '%'"></div>
                            </div>
                        </div>

                        <p class="text-[9px] font-bold text-gray-400 mt-4 uppercase">Facts: Released <span x-text="set.releaseDate"></span></p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function velocityTracker() {
            return {
                loading: true,
                trendingSets: [],
                async fetchData() {
                    try {
                        // Fetch the 9 most recent sets from the Pokemon TCG API
                        const response = await fetch('https://api.pokemontcg.io/v2/sets?orderBy=-releaseDate&pageSize=9');
                        const data = await response.json();
                        
                        const now = new Date();
                        this.trendingSets = data.data.map(set => {
                            const releaseDate = new Date(set.releaseDate);
                            const daysAgo = Math.max(1, (now - releaseDate) / 86400000);
                            
                            // CALCULATION LOGIC:
                            // 1. New sets (low daysAgo) get higher base score
                            // 2. Larger sets (total cards) indicate higher market density/complexity
                            let score = Math.floor(Math.max(10, 100 - (daysAgo * 0.4)));
                            
                            return {
                                id: set.id,
                                name: set.name,
                                series: set.series,
                                releaseDate: set.releaseDate,
                                total: set.total,
                                hypeScore: score
                            };
                        });
                        this.loading = false;
                    } catch (e) {
                        console.error("Market data error:", e);
                    }
                }
            }
        }
    </script>
</body>
</html>
