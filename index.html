<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-order Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-init="init()" x-cloak>

    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="/" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase px-3 py-1.5 rounded-full transition-colors">Home</a>
                 <a href="/products" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase px-3 py-1.5 rounded-full transition-colors">Products</a>
                 <a href="/preorder" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Preorder</a>
            </div>
            
            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="loginWithGoogle()" class="text-white hover:text-blue-400 px-2 py-2 text-[10px] font-bold uppercase transition-colors flex items-center gap-2">
                        <i class="fab fa-google text-sm"></i> <span class="hidden md:inline">Login</span>
                    </button>
                </template>
                <template x-if="user">
                    <button @click="profileOpen = true; fetchUserOrders(user.email)" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full transition-all border border-white/5">
                        <img :src="user.photoURL" class="w-5 h-5 rounded-full border border-gray-400">
                        <span class="text-[10px] font-bold uppercase hidden md:inline" x-text="user.displayName.split(' ')[0]"></span>
                    </button>
                </template>

                <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all relative">
                    <i class="fas fa-shopping-cart mr-2 text-xs"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-black" x-text="totalItems"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search & Planner Toggle -->
    <div class="bg-white border-b border-gray-200 sticky top-[110px] md:top-[68px] z-40">
        <div class="py-4 px-4 container mx-auto flex gap-2">
            <div class="relative flex-1">
                <input type="text" x-model="searchQuery" placeholder="Search pre-orders..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-sm"></i>
            </div>
            <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-wider hover:bg-blue-600 transition-colors shrink-0 shadow-sm">
                <i class="fas fa-calculator md:mr-2"></i> <span class="hidden md:inline" x-text="showPlanner ? 'Hide Planner' : 'Allocation Planner'"></span>
            </button>
        </div>
    </div>

    <!-- Allocation Planner -->
    <section x-show="showPlanner" x-transition class="container mx-auto px-4 mt-4 mb-4">
        <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-xl p-6 grid md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase text-gray-500">1. Select Product</label>
                <select x-model.number="calcSelectedId" class="w-full p-2.5 bg-gray-100 rounded-xl text-xs font-bold outline-none border-none">
                    <template x-for="item in products" :key="item.id">
                        <option :value="item.id" x-text="item.name"></option>
                    </template>
                </select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model.number="calcInputQty" class="w-full p-2.5 bg-gray-100 rounded-xl text-xs font-bold border-none" placeholder="Qty">
                    <input type="number" x-model.number="calcFillRate" class="w-full p-2.5 bg-gray-100 rounded-xl text-xs font-bold border-none" placeholder="Fill %">
                </div>
            </div>
            <div class="bg-blue-600 text-white p-6 rounded-2xl flex flex-col justify-center">
                <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Total 30% Downpayment Required</p>
                <p class="text-3xl font-black tracking-tighter">₱<span x-text="calculatedDownpayment"></span></p>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="container mx-auto py-6 px-4">
        <div x-show="isLoading" class="text-center py-12">
            <p class="text-blue-600 font-bold animate-pulse uppercase tracking-widest">Fetching Latest Drops...</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8" x-show="!isLoading">
            <template x-for="product in filteredProducts" :key="product.id">
                <div :class="(product.soldOut || isExpired(product.deadline)) ? 'opacity-60 grayscale' : 'hover:shadow-lg'" class="bg-white rounded-xl border border-gray-200 overflow-hidden transition-all flex flex-col">
                    <div class="relative aspect-square bg-white flex items-center justify-center p-4">
                        <span class="absolute top-2 left-2 text-[8px] font-black bg-slate-900 text-white px-2 py-1 rounded uppercase tracking-wider z-10" x-text="product.type"></span>
                        <img :src="product.image" class="max-h-full max-w-full object-contain">
                    </div>
                    
                    <div class="p-4 flex-1 flex flex-col">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-1" x-text="product.set"></p>
                        <h2 class="text-xs md:text-sm font-bold leading-tight mb-3 h-10 overflow-hidden" x-text="product.name"></h2>
                        
                        <div class="flex bg-gray-100 p-1 rounded-lg mb-3">
                            <button @click="product.isCase = false" :class="!product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1.5 rounded-md">UNIT</button>
                            <button @click="product.isCase = true" :class="product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1.5 rounded-md uppercase">CASE</button>
                        </div>

                        <div class="space-y-1 mb-4">
                            <div class="text-[10px] font-bold text-gray-400 uppercase">30% DP:</div>
                            <div class="text-lg font-black text-slate-900">₱<span x-text="calculateLiveDeposit(product).toLocaleString()"></span></div>
                        </div>

                        <button @click="addToCart(product)" :disabled="product.soldOut || isExpired(product.deadline)" class="w-full h-10 rounded-lg text-white text-[10px] font-black uppercase bg-slate-900 hover:bg-blue-600 transition-all mt-auto">
                            Add to Crate
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Cart Modal -->
    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false" x-transition.opacity></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 flex flex-col shadow-2xl" x-transition:enter="transition ease-out duration-300 transform translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-black text-slate-900 uppercase">Your Crate</h2>
                <button @click="cartOpen = false" class="text-3xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center gap-4 border-b pb-4">
                        <img :src="item.image" class="w-12 h-12 object-contain bg-gray-50 rounded">
                        <div class="flex-1">
                            <p class="font-bold text-xs" x-text="item.name"></p>
                            <div class="flex justify-between items-center mt-1">
                                <span class="text-[10px] font-black text-blue-600">₱<span x-text="(item.depositPrice * item.quantity).toLocaleString()"></span></span>
                                <div class="flex items-center border rounded">
                                    <button @click="updateCartQty(index, -1)" class="px-2 font-bold">-</button>
                                    <span class="text-[10px] px-2" x-text="item.quantity"></span>
                                    <button @click="updateCartQty(index, 1)" class="px-2 font-bold">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <div class="mt-6 pt-6 border-t" x-show="cart.length > 0">
                <div class="flex justify-between mb-4">
                    <span class="font-black text-xs uppercase">Total Downpayment</span>
                    <span class="font-black text-lg text-blue-600">₱<span x-text="cartDepositTotal"></span></span>
                </div>
                <button @click="openAssistedForm()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">Checkout Details</button>
            </div>
        </div>
    </div>

    <!-- Assisted Checkout Form -->
    <div x-show="assistedFormOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="assistedFormOpen = false"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Confirm Crate</h2>
                <p class="text-[10px] font-bold text-blue-600 uppercase">Please provide your details for the order sheet</p>
            </div>
            <form @submit.prevent="submitToSheet()" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Full Name</label>
                    <input type="text" x-model="customer.name" required class="w-full p-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Contact Number</label>
                    <input type="tel" x-model="customer.phone" required class="w-full p-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-1">Email (for history tracking)</label>
                    <input type="email" x-model="customer.email" required class="w-full p-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 text-sm font-bold outline-none">
                </div>
                <button type="submit" :disabled="isSubmitting" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition-all flex justify-center">
                    <span x-show="!isSubmitting">Record Order & Pay</span>
                    <span x-show="isSubmitting" class="animate-pulse">Syncing with Sheet...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Payment Modal -->
    <div x-show="paymentModalOpen" class="fixed inset-0 z-[80]" style="display: none;">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="paymentModalOpen = false"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-sm bg-white rounded-3xl p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black text-slate-900 uppercase mb-4">Pay Downpayment</h2>
            <div class="p-4 bg-blue-600 text-white rounded-xl mb-6">
                <p class="text-[10px] font-bold uppercase opacity-80">Amount Due (30%)</p>
                <p class="text-2xl font-black">₱<span x-text="cartDepositTotal"></span></p>
            </div>
            <img src="https://www.image2url.com/r2/default/images/1777388590470-26cd0706-92f7-4a95-b141-0c218a530962.png" class="w-48 h-48 mx-auto rounded-xl shadow-lg mb-6">
            <button @click="confirmAndRedirect()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest">I Have Paid via GCash</button>
        </div>
    </div>

    <!-- Profile Modal (Order History) -->
    <div x-show="profileOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="profileOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-8 flex flex-col shadow-2xl" x-transition:enter="transition ease-out duration-300 transform translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <div class="flex items-center gap-3">
                    <img :src="user?.photoURL" class="w-12 h-12 rounded-full border-2 border-slate-900">
                    <div class="text-left">
                        <h2 class="text-sm font-black uppercase text-slate-900" x-text="user?.displayName"></h2>
                        <p class="text-[9px] font-bold text-blue-600" x-text="user?.email"></p>
                    </div>
                </div>
                <button @click="profileOpen = false" class="text-3xl">&times;</button>
            </div>
            <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">Order History</h3>
            <div class="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                <template x-if="isLoadingOrders">
                    <p class="text-center py-10 animate-pulse text-[10px] font-bold text-gray-400">SYNCING HISTORY...</p>
                </template>
                <template x-for="order in myOrders" :key="order.orderId">
                    <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[8px] font-black text-gray-400 uppercase">Order ID: <span x-text="order.orderId"></span></span>
                            <span class="text-[8px] font-black uppercase px-2 py-1 rounded-full bg-blue-100 text-blue-700" x-text="order.status"></span>
                        </div>
                        <p class="text-xs font-bold text-slate-900" x-text="order.itemName"></p>
                        <div class="flex justify-between mt-3 text-[10px] font-black text-blue-600">
                            <span>Qty: <span x-text="order.qty"></span></span>
                            <span>₱<span x-text="order.totalPrice"></span></span>
                        </div>
                    </div>
                </template>
            </div>
            <button @click="logout()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-[10px] uppercase mt-6 border border-red-100">Sign Out</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",
            messagingSenderId: "828734198898",
            appId: "1:828734198898:web:e1eed4e9dbfb71ddb29eeb"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function shop() {
            return {
                isLoading: true,
                cartOpen: false,
                paymentModalOpen: false,
                profileOpen: false,
                assistedFormOpen: false,
                isSubmitting: false,
                searchQuery: '',
                cart: [],
                products: [], 
                myOrders: [],
                isLoadingOrders: false,
                user: null,
                customer: { name: '', email: '', phone: '' },
                scriptURL: 'YOUR_GOOGLE_APPS_SCRIPT_DEPLOY_URL', // <--- PASTE YOUR URL HERE
                showPlanner: false,
                calcSelectedId: null,
                calcInputQty: 1,
                calcFillRate: 100,

                async init() {
                    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv'; 
                    auth.onAuthStateChanged(user => {
                        this.user = user;
                        if (user) {
                            this.customer.name = user.displayName;
                            this.customer.email = user.email;
                        }
                    });
                    try {
                        const response = await fetch(sheetUrl);
                        const data = await response.text();
                        this.parseTSV(data);
                    } catch (e) { console.error(e); } finally { this.isLoading = false; }
                },

                parseTSV(tsvText) {
                    const lines = tsvText.split(/\r?\n/);
                    const headers = lines[0].split('\t').map(h => h.trim());
                    this.products = lines.slice(1).map(line => {
                        const values = line.split('\t');
                        let p = { selectedQty: 1, isCase: false };
                        headers.forEach((h, i) => {
                            let v = values[i]?.trim();
                            if (h === 'preorderDeadline') p.deadline = v ? new Date(v).getTime() : null;
                            else if (['id', 'price', 'unitsPerCase'].includes(h)) p[h] = Number(v) || 0;
                            else if (h === 'soldOut') p[h] = (v?.toUpperCase() === 'TRUE');
                            else p[h] = v;
                        });
                        return p;
                    }).filter(p => p.id);
                    if (this.products.length > 0) this.calcSelectedId = this.products[0].id;
                },

                async fetchUserOrders(email) {
                    this.isLoadingOrders = true;
                    const ordersUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0ppVCxJ3iyRtvhuVSbONCzFFx6g4nU-dpEHWx_FiSSCMJA6rdK0r5C1AeEP_13f_-Q77VL-6ggybF/pub?gid=0&single=true&output=tsv';
                    try {
                        const res = await fetch(ordersUrl);
                        const data = await res.text();
                        const lines = data.split(/\r?\n/);
                        const headers = lines[0].split('\t').map(h => h.trim());
                        this.myOrders = lines.slice(1).map(line => {
                            const values = line.split('\t');
                            let obj = {};
                            headers.forEach((h, i) => obj[h] = values[i]?.trim());
                            return obj;
                        }).filter(o => o.email?.toLowerCase() === email.toLowerCase());
                    } catch (e) { console.error(e); } finally { this.isLoadingOrders = false; }
                },

                async submitToSheet() {
                    if (this.isSubmitting) return;
                    this.isSubmitting = true;
                    const orderPayload = {
                        orderId: 'CD-' + Date.now().toString().slice(-6),
                        name: this.customer.name,
                        email: this.customer.email,
                        phone: this.customer.phone,
                        items: this.cart.map(i => `${i.name} (x${i.quantity})`).join(', '),
                        total: this.cartDepositTotal
                    };

                    try {
                        await fetch(this.scriptURL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderPayload)
                        });
                        this.assistedFormOpen = false;
                        this.paymentModalOpen = true;
                    } catch (e) {
                        alert("Sync failed. Proceeding to payment anyway.");
                        this.assistedFormOpen = false;
                        this.paymentModalOpen = true;
                    } finally {
                        this.isSubmitting = false;
                    }
                },

                loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                logout() { auth.signOut().then(() => { this.user = null; this.profileOpen = false; }); },
                calculateFullPrice(p) { return (p.isCase ? p.price * p.unitsPerCase : p.price); },
                calculateLiveDeposit(p) { return this.calculateFullPrice(p) * 0.3; },
                get calculatedDownpayment() {
                    const p = this.products.find(x => x.id == this.calcSelectedId);
                    return (p?.price * this.calcInputQty * 0.3 * (this.calcFillRate / 100)).toLocaleString();
                },
                get filteredProducts() { return this.products.filter(p => p.name.toLowerCase().includes(this.searchQuery.toLowerCase())); },
                get cartDepositTotal() { return this.cart.reduce((s, i) => s + (i.depositPrice * i.quantity), 0).toLocaleString(); },
                get totalItems() { return this.cart.reduce((s, i) => s + i.quantity, 0); },
                addToCart(p) {
                    const price = this.calculateFullPrice(p);
                    const existing = this.cart.find(i => i.id === p.id && i.isCase === p.isCase);
                    if (existing) existing.quantity++;
                    else this.cart.push({...p, depositPrice: price * 0.3, quantity: 1});
                    this.cartOpen = true;
                },
                updateCartQty(idx, n) { this.cart[idx].quantity += n; if (this.cart[idx].quantity <= 0) this.cart.splice(idx, 1); },
                openAssistedForm() { this.cartOpen = false; this.assistedFormOpen = true; },
                isExpired(d) { return d && (d - Date.now() < 0); },
                confirmAndRedirect() { window.open("https://m.me/cratedropcollective", "_blank"); }
            }
        }
    </script>
</body>
</html>
