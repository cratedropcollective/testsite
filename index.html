        .no-scrollbar::-webkit-scrollbar { display: none; }

</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-cloak>

            <a href="https://cratedropcollective.github.io/" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="https://cratedropcollective.github.io/" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Home</a>
                 <a href="/products" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Products</a>
                 <a href="/preorder" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Preorder</a>
            </div>
            
            <div class="flex items-center space-x-3 md:space-x-4">
                <!-- NEW: Firebase Auth Buttons -->
                <template x-if="!user">
                    <button @click="loginWithGoogle()" class="text-white hover:text-blue-400 px-2 py-2 text-[10px] font-bold uppercase transition-colors flex items-center gap-2">
                        <i class="fab fa-google text-sm"></i> <span class="hidden md:inline">Login</span>
                    </button>
                </template>
                <template x-if="user">
                    <button @click="profileOpen = true" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full transition-all">
                        <img :src="user.photoURL" class="w-5 h-5 rounded-full border border-gray-400">
                        <span class="text-[10px] font-bold uppercase hidden md:inline" x-text="user.displayName.split(' ')[0]"></span>
                    </button>
                </template>

                <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all relative">
                    <i class="fas fa-shopping-cart mr-2 text-xs"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-black" x-text="totalItems"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search & Planner Toggle -->
    <div class="bg-white border-b border-gray-200 sticky top-[110px] md:top-[68px] z-40">
        <div class="py-4 px-4 container mx-auto">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" x-model="searchQuery" placeholder="Search pre-orders..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-sm"></i>
                </div>
                <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-wider hover:bg-blue-600 transition-colors flex items-center justify-center shrink-0 shadow-sm">
                    <i class="fas fa-calculator md:mr-2"></i>
                    <span x-text="showPlanner ? 'Hide Planner' : 'Allocation Planner'" class="hidden md:inline"></span>
                    <span x-text="showPlanner ? 'Hide' : 'Planner'" class="md:hidden ml-1"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- [Allocation Planner Section and Product Grid remain unchanged as requested] -->

    <!-- User Profile & Orders Modal -->
    <div x-show="profileOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="profileOpen = false" x-transition.opacity></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 overflow-y-auto flex flex-col shadow-2xl" x-transition:enter="transition ease-out duration-300 transform translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div class="flex items-center gap-3">
                    <img :src="user?.photoURL" class="w-10 h-10 rounded-full border-2 border-slate-900">
                    <div>
                        <h2 class="text-sm font-black text-slate-900 uppercase leading-none" x-text="user?.displayName"></h2>
                        <p class="text-[10px] text-gray-500 font-bold" x-text="user?.email"></p>
                    </div>
                </div>
                <button @click="profileOpen = false" class="text-3xl">&times;</button>
            </div>

            <h3 class="text-xs font-black uppercase text-blue-600 mb-4"><i class="fas fa-box-open mr-2"></i>My Pre-Orders</h3>
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-3">
                <template x-if="isLoadingOrders">
                    <div class="text-center py-8 text-[10px] text-gray-500 font-bold uppercase animate-pulse">Fetching records...</div>
                </template>
                <template x-if="!isLoadingOrders && myOrders.length === 0">
                    <div class="text-center py-8 text-[10px] text-gray-500 font-bold uppercase border-2 border-dashed border-gray-200 rounded-xl">No confirmed orders found.</div>
                </template>
                <template x-for="order in myOrders" :key="order.orderId">
                    <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black text-gray-400 uppercase">Order #<span x-text="order.orderId"></span></span>
                            <span class="text-[9px] font-black uppercase px-2 py-1 rounded bg-blue-100 text-blue-700" x-text="order.status"></span>
                        </div>
                        <div class="text-xs font-bold text-slate-900" x-text="order.itemName"></div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-600 mt-2">
                            <span>Qty: <span x-text="order.qty"></span></span>
                            <span>Total: ₱<span x-text="order.totalPrice"></span></span>
                        </div>
                    </div>
                </template>
            </div>

            <button @click="logout()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-xs uppercase mt-6 border border-red-200">Sign Out</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function shop() {
            return {
                isLoading: true,
                cartOpen: false,
                paymentModalOpen: false,
                searchQuery: '',
                cart: [],
                products: [], 
                now: new Date().getTime(), 
                showPlanner: false,
                calcSelectedId: null,
                calcInputQty: 1,
                calcFillRate: 100,
                calcIsCase: false,

                // User State
                user: null,
                profileOpen: false,
                myOrders: [],
                isLoadingOrders: false,

                async init() {
                    const inventoryUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv'; 
                    
                    // Listen for Auth changes
                    auth.onAuthStateChanged(user => {
                        this.user = user;
                        if (user) this.fetchUserOrders(user.email);
                    });

                    setInterval(() => { this.now = new Date().getTime(); }, 1000);

                    try {
                        const response = await fetch(inventoryUrl);
                        const data = await response.text();
                        this.parseTSV(data);
                    } catch (error) {
                        console.error('Error:', error);
                    } finally {
                        this.isLoading = false;
                    }
                },

                loginWithGoogle() {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    auth.signInWithPopup(provider);
                },

                logout() {
                    auth.signOut().then(() => {
                        this.user = null;
                        this.profileOpen = false;
                    });
                },

                async fetchUserOrders(email) {
                    this.isLoadingOrders = true;
                    // Your provided Orders TSV link
                    const ordersUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0ppVCxJ3iyRtvhuVSbONCzFFx6g4nU-dpEHWx_FiSSCMJA6rdK0r5C1AeEP_13f_-Q77VL-6ggybF/pub?gid=0&single=true&output=tsv';
                    
                    try {
                        const response = await fetch(ordersUrl);
                        const data = await response.text();
                        const lines = data.split(/\r?\n/);
                        const headers = lines[0].split('\t').map(h => h.trim());
                        
                        this.myOrders = lines.slice(1).map(line => {
                            const values = line.split('\t');
                            let obj = {};
                            headers.forEach((h, i) => obj[h] = values[i]?.trim());
                            return obj;
                        }).filter(order => order.email?.toLowerCase() === email.toLowerCase());
                    } catch (e) {
                        console.error('Orders fetch failed:', e);
                    } finally {
                        this.isLoadingOrders = false;
                    }

                isExpired(deadline) { /* ... same as before ... */ },
                addToCart(product) { /* ... same as before ... */ },
                updateCartQty(index, change) { /* ... same as before ... */ },
                checkoutSelf() { this.cartOpen = false; this.paymentModalOpen = true; },
                async confirmAndRedirect() { /* ... same as before ... */ }
            }
        }
    </script>
</body>
</html>
