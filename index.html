<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-init="init()" x-cloak>

    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <!-- Auth & Cart -->
            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="login()" class="text-[10px] font-black uppercase bg-blue-600 px-4 py-2 rounded-full hover:bg-blue-500 transition">Login</button>
                </template>
                
                <template x-if="user">
                    <div class="flex items-center space-x-3">
                        <button @click="historyOpen = true" class="text-[10px] font-black uppercase text-gray-400 hover:text-white transition">History</button>
                        <div class="relative" x-data="{ open: false }">
                            <img @click="open = !open" :src="user.photoURL" class="w-8 h-8 rounded-full border-2 border-blue-500 cursor-pointer">
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 text-slate-900 z-50">
                                <div class="px-4 py-2 border-b border-gray-100">
                                    <p class="text-[10px] font-black uppercase text-gray-400">Signed in as</p>
                                    <p class="text-xs font-bold truncate" x-text="user.displayName"></p>
                                </div>
                                <button @click="logout()" class="w-full text-left px-4 py-2 text-xs font-bold text-red-500 hover:bg-gray-50 uppercase">Sign Out</button>
                            </div>
                        </div>
                    </div>
                </template>

                <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all relative">
                    <i class="fas fa-shopping-cart mr-2 text-xs"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-black" x-text="totalItems"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search & Planner (Retained) -->
    <div class="bg-white border-b border-gray-200 sticky top-[68px] z-40">
        <div class="py-4 px-4 container mx-auto flex gap-2">
            <div class="relative flex-1">
                <input type="text" x-model="searchQuery" placeholder="Search pre-orders..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm outline-none">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-sm"></i>
            </div>
            <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase shadow-sm">
                <i class="fas fa-calculator mr-2"></i> Planner
            </button>
        </div>
    </div>

    <!-- Allocation Planner (Retained Logic) -->
    <section x-show="showPlanner" x-transition class="container mx-auto px-4 mt-4 mb-4">
        <div class="bg-white border rounded-2xl p-6 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h3 class="font-black uppercase text-xs text-blue-600">Allocation Simulator</h3>
                <select x-model.number="calcSelectedId" class="w-full p-2.5 bg-gray-100 rounded-xl text-xs font-bold outline-none">
                    <template x-for="item in products" :key="item.id">
                        <option :value="item.id" x-text="item.name"></option>
                    </template>
                </select>
                <div class="flex gap-2">
                    <input type="number" x-model.number="calcInputQty" class="w-1/2 p-2.5 bg-gray-100 rounded-xl text-xs font-bold">
                    <button @click="calcIsCase = !calcIsCase" class="w-1/2 rounded-xl text-[10px] font-black uppercase border-2 border-gray-100" :class="calcIsCase ? 'text-blue-600 bg-white shadow-sm' : 'bg-gray-50'" x-text="calcIsCase ? 'Case Mode' : 'Unit Mode'"></button>
                </div>
            </div>
            <div class="bg-slate-900 text-white p-6 rounded-2xl flex flex-col justify-center">
                <p class="text-[10px] font-bold uppercase opacity-60">Est. 30% Downpayment</p>
                <p class="text-3xl font-black">₱<span x-text="calculatedDownpayment"></span></p>
            </div>
        </div>
    </section>

    <!-- Product Grid (Retained Logic) -->
    <main class="container mx-auto py-6 px-4 grid grid-cols-2 md:grid-cols-4 gap-6">
        <template x-for="product in filteredProducts" :key="product.id">
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden flex flex-col relative" :class="isExpired(product.deadline) ? 'opacity-60 grayscale' : ''">
                <div class="aspect-square bg-gray-50 flex items-center justify-center p-4 relative">
                    <span class="absolute top-2 left-2 text-[8px] font-black bg-black text-white px-2 py-1 rounded uppercase" x-text="product.type"></span>
                    <img :src="product.image" class="max-h-full object-contain">
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <p class="text-[10px] font-black text-blue-600 uppercase mb-1" x-text="product.set"></p>
                    <h2 class="text-xs font-bold h-10 overflow-hidden leading-tight mb-4" x-text="product.name"></h2>
                    
                    <div class="flex bg-gray-100 p-1 rounded-lg mb-4">
                        <button @click="product.isCase = false" :class="!product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md uppercase">Unit</button>
                        <button @click="product.isCase = true" :class="product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md uppercase">Case</button>
                    </div>

                    <div class="mb-4">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">30% Downpayment</p>
                        <p class="text-lg font-black">₱<span x-text="calculateLiveDeposit(product).toLocaleString()"></span></p>
                    </div>

                    <button @click="addToCart(product)" :disabled="isExpired(product.deadline)" class="w-full bg-slate-900 text-white py-2.5 rounded-lg text-[10px] font-bold uppercase hover:bg-blue-600 transition">
                        <span x-text="isExpired(product.deadline) ? 'Pre-order Closed' : 'Add to Crate'"></span>
                    </button>
                </div>
            </div>
        </template>
    </main>

    <!-- User History Dashboard (Slide Over) -->
    <div x-show="historyOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="historyOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase">Order Dashboard</h2>
                <button @click="historyOpen = false" class="text-2xl font-black">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-4">
                <template x-if="orderHistory.length === 0">
                    <div class="text-center py-12">
                        <i class="fas fa-box-open text-gray-200 text-4xl mb-4"></i>
                        <p class="text-xs font-bold text-gray-400 uppercase">No history found for this account.</p>
                    </div>
                </template>
                <template x-for="order in orderHistory" :key="order.id">
                    <div class="border rounded-xl p-4 bg-gray-50">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-black uppercase text-gray-400" x-text="'Ref: #' + order.id"></span>
                            <span :class="order.status === 'Confirmed' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'" class="text-[8px] font-black px-2 py-0.5 rounded uppercase" x-text="order.status"></span>
                        </div>
                        <p class="text-xs font-bold" x-text="order.productName"></p>
                        <p class="text-[10px] font-bold text-blue-600 uppercase mt-1">Paid DP: ₱<span x-text="order.paidAmount"></span></p>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar & Payment Logic remain consistent with existing architecture -->

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",
            messagingSenderId: "828734198898",
            appId: "1:828734198898:web:e1eed4e9dbfb71ddb29eeb"
        };
        firebase.initializeApp(firebaseConfig);

        function shop() {
            return {
                products: [],
                cart: [],
                user: null,
                orderHistory: [],
                historyOpen: false,
                cartOpen: false,
                showPlanner: false,
                searchQuery: '',
                now: new Date().getTime(),

                async init() {
                    firebase.auth().onAuthStateChanged(user => { 
                        this.user = user; 
                        if(user) this.fetchUserHistory();
                    });

                    // Sync products from your Google Sheets TSV
                    const res = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv');
                    const text = await res.text();
                    this.parseTSV(text);
                    
                    setInterval(() => { this.now = new Date().getTime(); }, 1000);
                },

                async fetchUserHistory() {
                    // Logic to pull status from the Order Database TSV filtered by user.email
                    const historyTsv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ77VL-6ggybF07Z9v85p3F6vB8Y8vU4v9wY3wX/pub?output=tsv';
                    try {
                        const res = await fetch(historyTsv);
                        const text = await res.text();
                        // Custom filter logic based on headers in your Order Data Base
                        this.orderHistory = []; // Populate with matching rows
                    } catch (e) { console.error("History fetch error", e); }
                },

                parseTSV(tsvText) {
                    const lines = tsvText.split('\n').filter(l => l.trim());
                    const headers = lines[0].split('\t').map(h => h.trim());
                    this.products = lines.slice(1).map(line => {
                        const cols = line.split('\t');
                        let p = {};
                        headers.forEach((h, i) => { p[h] = cols[i]?.trim(); });
                        p.id = Number(p.id);
                        p.price = Number(p.price);
                        p.unitsPerCase = Number(p.unitsPerCase) || 1;
                        p.isCase = false;
                        p.selectedQty = 1;
                        p.deadline = p.preorderDeadline ? new Date(p.preorderDeadline).getTime() : null;
                        return p;
                    });
                    if(this.products.length) this.calcSelectedId = this.products[0].id;
                },

                calculateLiveDeposit(p) {
                    const base = p.isCase ? (p.price * p.unitsPerCase) : p.price;
                    return base * 0.3;
                },

                isExpired(deadline) { return deadline && (deadline < this.now); },

                login() {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    firebase.auth().signInWithPopup(provider);
                },

                logout() { firebase.auth().signOut(); },

                // ... Remaining Cart and Redirect Logic ...
            }
        }
    </script>
</body>
</html>
