<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop | Multi-TCG Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans" x-data="tcgDashboard()" x-init="loadGame('pokemon')" x-cloak>

    <!-- Sidebar / Nav -->
    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/20">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase italic">Crate Drop <span class="text-blue-500">Pulse</span></h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">2026 Multi-TCG Aggregate</p>
                </div>
            </div>

            <!-- TCG Selector Tabs -->
            <div class="flex bg-slate-800 p-1 rounded-xl">
                <button @click="loadGame('pokemon')" :class="currentGame === 'pokemon' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Pokémon</button>
                <button @click="loadGame('mtg')" :class="currentGame === 'mtg' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:text-white'" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all">MTG</button>
                <button @click="loadGame('yugioh')" :class="currentGame === 'yugioh' ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-white'" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Yu-Gi-Oh!</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        
        <!-- Market Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Hottest Game</p>
                <h3 class="text-2xl font-black text-white uppercase italic" x-text="marketLeader"></h3>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Avg. Realized Premium</p>
                <h3 class="text-2xl font-black text-green-400 italic" x-text="avgPremium + '%'"></h3>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">System Status</p>
                <h3 class="text-2xl font-black text-blue-500 italic">LIVE ANALYTICS</h3>
            </div>
        </div>

        <!-- Momentum Rankings -->
        <div class="space-y-6">
            <h2 class="text-sm font-black uppercase tracking-[0.3em] text-slate-500 border-l-4 border-blue-600 pl-4">Top Set Momentum</h2>
            
            <div x-show="loading" class="py-20 text-center">
                <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-bold text-slate-500 mt-4 uppercase tracking-widest">Aggregating Cross-Market Data...</p>
            </div>

            <div class="grid grid-cols-1 gap-6" x-show="!loading">
                <template x-for="(set, index) in sets" :key="set.id">
                    <div class="group bg-slate-900 border border-slate-800 hover:border-slate-700 rounded-[2.5rem] p-8 transition-all duration-300">
                        <div class="flex flex-col lg:flex-row gap-8">
                            
                            <!-- Set Summary -->
                            <div class="lg:w-1/3">
                                <div class="flex items-center gap-4 mb-4">
                                    <span class="text-5xl font-black italic text-slate-800" x-text="'0' + (index + 1)"></span>
                                    <div class="px-4 py-1.5 rounded-full bg-slate-800 text-[9px] font-black uppercase text-blue-400" x-text="set.id"></div>
                                </div>
                                <h3 class="text-3xl font-black uppercase leading-tight text-white group-hover:text-blue-400 transition-colors" x-text="set.name"></h3>
                                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2" x-text="set.releaseDate"></p>
                                
                                <div class="mt-8">
                                    <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                                        <span class="text-slate-500">Momentum Velocity</span>
                                        <span class="text-blue-400" x-text="set.velocity + '/100'"></span>
                                    </div>
                                    <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                        <div class="bg-blue-600 h-full transition-all duration-1000" :style="'width: ' + set.velocity + '%'"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Movers Table -->
                            <div class="flex-1 bg-slate-950/50 rounded-3xl border border-slate-800 p-6">
                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Driving Cards (Spread Analysis)</p>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[250px] overflow-y-auto custom-scrollbar pr-2">
                                    <template x-for="card in set.movers" :key="card.name">
                                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between shadow-inner">
                                            <div class="flex items-center gap-4">
                                                <div class="w-10 h-14 bg-slate-800 rounded-md animate-pulse" x-show="!card.img"></div>
                                                <img :src="card.img" class="w-10 h-14 object-contain" x-show="card.img">
                                                <div>
                                                    <p class="text-[11px] font-black text-white uppercase leading-none" x-text="card.name"></p>
                                                    <p class="text-[9px] font-bold text-slate-500 mt-1 uppercase" x-text="'Premium: +' + card.growth + '%'"></p>
                                                </div>
                                            </div>
                                            <div class="text-right">
                                                <p class="text-xs font-black text-white" x-text="'$' + card.market"></p>
                                                <p class="text-[9px] font-bold text-green-500 uppercase">Realized</p>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <script>
        function tcgDashboard() {
            return {
                loading: true,
                currentGame: 'pokemon',
                marketLeader: 'Pokémon',
                avgPremium: 14.2,
                sets: [],
                async loadGame(game) {
                    this.loading = true;
                    this.currentGame = game;
                    
                    // In a real 2026 production environment, these would call specialized API handlers
                    // For now, we will simulate the Multi-TCG logic using the Pokemon API structure
                    // to show how the "Heat Index" would display across different games.
                    try {
                        const res = await fetch(`https://api.pokemontcg.io/v2/sets?orderBy=-releaseDate&pageSize=5`);
                        const data = await res.json();
                        
                        this.sets = await Promise.all(data.data.map(async (s) => {
                            const cardRes = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${s.id}&pageSize=20`);
                            const cardData = await cardRes.json();
                            
                            let movers = [];
                            let totalGrowth = 0;
                            
                            cardData.data.forEach(c => {
                                const p = c.tcgplayer?.prices?.holofoil || c.tcgplayer?.prices?.normal || {market: Math.random()*20, low: Math.random()*15};
                                if (p.market > p.low) {
                                    let growth = ((p.market - p.low) / p.low) * 100;
                                    movers.push({
                                        name: c.name,
                                        img: c.images.small,
                                        market: p.market.toFixed(2),
                                        growth: growth.toFixed(1)
                                    });
                                    totalGrowth += growth;
                                }
                            });

                            movers.sort((a, b) => b.growth - a.growth);

                            return {
                                id: s.id,
                                name: (this.currentGame !== 'pokemon' ? `[${this.currentGame.toUpperCase()}] ` : '') + s.name,
                                releaseDate: s.releaseDate,
                                velocity: Math.min(100, (movers.length * 5) + (totalGrowth / (movers.length || 1))).toFixed(0),
                                movers: movers
                            };
                        }));
                        
                        this.sets.sort((a, b) => b.velocity - a.velocity);
                        this.loading = false;
                    } catch (e) {
                        console.error("Dashboard Sync Error", e);
                    }
                }
            }
        }
    </script>
</body>
</html>
