<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crate Drop | Global Set Velocity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(51, 65, 85, 0.4); backdrop-filter: blur(12px); }
        .rank-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 p-4 md:p-12 font-sans" x-data="globalMomentum()" x-init="scanAllEras()">

    <div class="max-w-4xl mx-auto">
        <header class="mb-12 border-b border-slate-800 pb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Global <span class="text-blue-500 underline decoration-4 underline-offset-8">Momentum</span></h1>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mt-4">Top 10 Performance: All Generations (Singles >$10)</p>
            </div>
            <div class="hidden md:block text-right">
                <div class="flex items-center gap-2 bg-blue-500/10 border border-blue-500/20 px-3 py-1.5 rounded-full">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    <span class="text-[9px] font-black uppercase text-blue-400">Live API Feed</span>
                </div>
            </div>
        </header>

        <!-- Loader -->
        <div x-show="loading" class="py-32 text-center">
            <div class="inline-block w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] font-black text-slate-500 mt-6 uppercase tracking-[0.5em] animate-pulse">Aggregating Global Market Spreads...</p>
        </div>

        <!-- Ranking List -->
        <div class="space-y-4" x-show="!loading">
            <template x-for="(set, index) in rankedSets" :key="set.id">
                <div class="glass-card rounded-2xl p-6 transition-all hover:scale-[1.01] hover:border-blue-500/50 group">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                        
                        <div class="flex items-center gap-6">
                            <!-- Rank -->
                            <div class="w-12 text-center">
                                <span class="text-4xl font-black italic text-slate-800 group-hover:text-blue-500 transition-colors rank-glow" x-text="index + 1"></span>
                            </div>
                            
                            <!-- Set Info -->
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest" x-text="set.series"></span>
                                    <span class="text-slate-700">/</span>
                                    <span class="text-[9px] font-black text-slate-500 uppercase" x-text="set.cardCount + ' Hits'"></span>
                                </div>
                                <h3 class="text-xl font-black text-white uppercase italic tracking-tight" x-text="set.name"></h3>
                            </div>
                        </div>

                        <!-- Data Section -->
                        <div class="flex gap-8 items-center bg-slate-950/50 px-6 py-3 rounded-xl border border-white/5">
                            <div class="text-center">
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Avg Hit Value</p>
                                <p class="text-lg font-black text-white" x-text="'$' + set.avgPrice"></p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Velocity Score</p>
                                <div class="flex items-center gap-2">
                                    <i class="fas fa-caret-up text-green-500 text-xs"></i>
                                    <p class="text-2xl font-black text-green-400 italic" x-text="set.score + '%'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        function globalMomentum() {
            return {
                loading: true,
                rankedSets: [],
                async scanAllEras() {
                    this.loading = true;
                    try {
                        // Scan high-volume cards across all series
                        // Query filters for market price > 10 to reduce payload noise
                        const res = await fetch('https://api.pokemontcg.io/v2/cards?q=tcgplayer.prices.holofoil.market:[10 TO 2000]&pageSize=250&orderBy=-tcgplayer.prices.holofoil.market');
                        const data = await res.json();
                        
                        const setMap = {};

                        data.data.forEach(card => {
                            const pricing = card.tcgplayer?.prices?.holofoil || card.tcgplayer?.prices?.normal || card.tcgplayer?.prices?.reverseHolofoil || { market: 0, low: 0 };
                            const market = pricing.market || 0;
                            const low = pricing.low || 1;

                            // Calculation: Spread % between current Market and current Low floor
                            const spread = ((market - low) / low) * 100;

                            if (!setMap[card.set.id]) {
                                setMap[card.set.id] = {
                                    id: card.set.id,
                                    name: card.set.name,
                                    series: card.set.series,
                                    totalMomentum: 0,
                                    totalPrice: 0,
                                    count: 0
                                };
                            }
                            
                            setMap[card.set.id].totalMomentum += spread;
                            setMap[card.set.id].totalPrice += market;
                            setMap[card.set.id].count++;
                        });

                        this.rankedSets = Object.values(setMap)
                            .map(set => ({
                                ...set,
                                score: (set.totalMomentum / set.count).toFixed(1),
                                avgPrice: (set.totalPrice / set.count).toFixed(2),
                                cardCount: set.count
                            }))
                            // Ensure the set has a significant number of "hit" cards to be considered a trend
                            .filter(set => set.cardCount >= 2 && set.score > 0)
                            .sort((a, b) => b.score - a.score)
                            .slice(0, 10);

                    } catch (e) {
                        console.error("API Error:", e);
                    }
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
