<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-cloak>
    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="index.html" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="index.html" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Preorder</a>
                 <a href="velocity.html" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Velocity</a>
            </div>
            <div class="flex items-center">
                <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all relative">
                    <i class="fas fa-shopping-cart mr-2 text-xs"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Preorder Content (Your existing TSV logic) -->
    <main class="container mx-auto py-12 px-4 text-center">
        <h1 class="text-4xl font-black uppercase tracking-tighter mb-4">Active <span class="text-blue-600">Drops</span></h1>
        <p class="text-gray-500 font-bold uppercase text-[10px] tracking-widest mb-12 italic">Check the Velocity tab for real-time market movement before you secure your crate.</p>
        <!-- Your existing product grid would go here -->
    </main>

    <script>
        function shop() {
            return {
                cartOpen: false,
                cartDepositTotal: "0",
                // ... rest of your existing shop logic
            }
        }
    </script>
</body>
</html>
