<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-init="init()" x-cloak>

    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="https://cratedropcollective.github.io/" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Home</a>
                 <a href="/products" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Products</a>
                 <a href="/preorder" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Preorder</a>
            </div>
            
            <div class="flex items-center space-x-3 md:space-x-4">
                <template x-if="!user">
                    <button @click="loginWithGoogle()" class="text-white hover:text-blue-400 px-2 py-2 text-[10px] font-bold uppercase transition-colors flex items-center gap-2">
                        <i class="fab fa-google text-sm"></i> <span class="hidden md:inline">Login</span>
                    </button>
                </template>
                <template x-if="user">
                    <button @click="profileOpen = true" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-full transition-all">
                        <img :src="user.photoURL" class="w-5 h-5 rounded-full border border-gray-400">
                        <span class="text-[10px] font-bold uppercase hidden md:inline" x-text="user.displayName.split(' ')[0]"></span>
                    </button>
                </template>

                <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all relative">
                    <i class="fas fa-shopping-cart mr-2 text-xs"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-black" x-text="totalItems"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search & Planner Toggle -->
    <div class="bg-white border-b border-gray-200 sticky top-[110px] md:top-[68px] z-40">
        <div class="py-4 px-4 container mx-auto">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" x-model="searchQuery" placeholder="Search pre-orders..." class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-sm"></i>
                </div>
                <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] md:text-xs font-black uppercase tracking-wider hover:bg-blue-600 transition-colors flex items-center justify-center shrink-0 shadow-sm">
                    <i class="fas fa-calculator md:mr-2"></i>
                    <span x-text="showPlanner ? 'Hide Planner' : 'Allocation Planner'" class="hidden md:inline"></span>
                    <span x-text="showPlanner ? 'Hide' : 'Planner'" class="md:hidden ml-1"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Allocation Planner Section -->
    <section x-show="showPlanner" x-transition class="container mx-auto px-2 md:px-4 mt-4 mb-4">
        <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-xl">
            <div class="bg-slate-900 p-4 flex justify-between items-center">
                <div>
                    <h2 class="text-white text-sm font-black uppercase tracking-tighter">Allocation & DP Simulator</h2>
                    <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Plan volume vs expected cuts</p>
                </div>
            </div>
            <div class="p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="block text-[10px] font-black uppercase text-gray-500">1. Select Product</label>
                    <select x-model.number="calcSelectedId" class="w-full p-2.5 bg-gray-100 border-none rounded-xl text-xs font-bold outline-none">
                        <template x-for="item in products" :key="item.id">
                            <option :value="item.id" x-text="item.name"></option>
                        </template>
                    </select>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" x-model.number="calcInputQty" class="p-2.5 bg-gray-100 rounded-xl text-xs font-bold" placeholder="Qty">
                        <input type="number" x-model.number="calcFillRate" class="p-2.5 bg-gray-100 rounded-xl text-xs font-bold" placeholder="Fill %">
                    </div>
                </div>
                <div class="bg-blue-600 text-white p-5 rounded-2xl">
                    <p class="text-[10px] font-bold uppercase opacity-80">DP Required (30%)</p>
                    <p class="text-3xl font-black">₱<span x-text="calculatedDownpayment"></span></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="container mx-auto py-6 px-2 md:px-4">
        <div x-show="isLoading" class="text-center py-12">
            <p class="text-blue-600 font-bold animate-pulse uppercase tracking-widest">Loading Drops...</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-8" x-show="!isLoading">
            <template x-for="product in filteredProducts" :key="product.id">
                <div :class="(product.soldOut || isExpired(product.deadline)) ? 'opacity-60 grayscale' : 'hover:shadow-lg'" class="bg-white rounded-xl border border-gray-200 overflow-hidden transition-all flex flex-col relative">
                    <div class="relative aspect-square bg-[#fdfdfd] flex items-center justify-center p-4">
                        <span class="absolute top-2 left-2 text-[8px] font-black bg-slate-900 text-white px-2 py-1 rounded shadow-sm uppercase z-10" x-text="product.type"></span>
                        <img :src="product.image" class="max-h-full max-w-full object-contain">
                    </div>
                    
                    <div class="p-3 md:p-5 flex-1 flex flex-col">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-1" x-text="product.set"></p>
                        <h2 class="text-xs md:text-sm font-bold leading-tight mb-2 h-8 md:h-10" x-text="product.name"></h2>
                        
                        <div class="flex bg-gray-100 p-1 rounded-lg mb-3">
                            <button @click="product.isCase = false" :class="!product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md uppercase">Unit</button>
                            <button @click="product.isCase = true" :class="product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md uppercase">Case</button>
                        </div>

                        <div class="mb-3 text-[9px] font-bold p-2 rounded-lg border text-center uppercase" :class="isExpired(product.deadline) ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-700'">
                            <span x-text="isExpired(product.deadline) ? '🛑 Closed' : '⏳ Closes: ' + getCountdown(product.deadline)"></span>
                        </div>

                        <div class="space-y-1 mb-4">
                            <div class="text-[10px] font-bold text-slate-500 uppercase">30% Downpayment:</div>
                            <div class="text-sm md:text-lg font-black text-slate-900">₱<span x-text="calculateLiveDeposit(product).toLocaleString()"></span></div>
                        </div>

                        <button @click="addToCart(product)" :disabled="product.soldOut || isExpired(product.deadline)" class="w-full h-9 rounded-lg text-white text-[10px] font-bold uppercase bg-slate-900 hover:bg-blue-600 transition-all mt-auto">
                            Add to Crate
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false" x-transition.opacity></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 overflow-y-auto flex flex-col shadow-2xl" x-transition:enter="transition ease-out duration-300 transform translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-black text-slate-900 uppercase">Your Crate</h2>
                <button @click="cartOpen = false" class="text-3xl">&times;</button>
            </div>
            <div class="flex-1 space-y-4">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex items-center border-b pb-4">
                        <img :src="item.image" class="w-10 h-10 object-contain mr-3">
                        <div class="flex-1">
                            <p class="font-bold text-[10px]" x-text="item.name"></p>
                            <p class="text-[9px] font-black text-blue-600 uppercase">₱<span x-text="(item.depositPrice * item.quantity).toLocaleString()"></span></p>
                        </div>
                        <button @click="updateCartQty(index, -1)" class="px-2 font-bold">-</button>
                        <span class="text-xs font-black mx-2" x-text="item.quantity"></span>
                        <button @click="updateCartQty(index, 1)" class="px-2 font-bold">+</button>
                    </div>
                </template>
            </div>
            <div class="mt-6 pt-6 border-t" x-show="cart.length > 0">
                <div class="flex justify-between text-sm font-black text-blue-600 uppercase mb-4">
                    <span>30% Downpayment:</span><span>₱<span x-text="cartDepositTotal"></span></span>
                </div>
                <button @click="checkoutSelf()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black text-xs uppercase">Pay via QR</button>
            </div>
        </div>
    </div>

    <!-- User Profile Modal -->
    <div x-show="profileOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="profileOpen = false" x-transition.opacity></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 overflow-y-auto flex flex-col shadow-2xl" x-transition:enter="transition ease-out duration-300 transform translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div class="flex items-center gap-3">
                    <img :src="user?.photoURL" class="w-10 h-10 rounded-full border-2 border-slate-900">
                    <div>
                        <h2 class="text-sm font-black text-slate-900 uppercase leading-none" x-text="user?.displayName"></h2>
                        <p class="text-[10px] text-gray-500 font-bold" x-text="user?.email"></p>
                    </div>
                </div>
                <button @click="profileOpen = false" class="text-3xl">&times;</button>
            </div>
            <h3 class="text-xs font-black uppercase text-blue-600 mb-4">My Orders</h3>
            <div class="flex-1 space-y-3">
                <template x-if="isLoadingOrders">
                    <div class="text-center py-4 text-[10px] font-bold uppercase animate-pulse">Syncing...</div>
                </template>
                <template x-for="order in myOrders" :key="order.orderId">
                    <div class="bg-gray-50 border p-4 rounded-xl">
                        <div class="flex justify-between mb-1">
                            <span class="text-[9px] font-black text-gray-400">#<span x-text="order.orderId"></span></span>
                            <span class="text-[9px] font-black uppercase text-blue-600" x-text="order.status"></span>
                        </div>
                        <div class="text-[11px] font-bold" x-text="order.itemName"></div>
                        <div class="text-[10px] font-bold text-gray-600 mt-1">Total: ₱<span x-text="order.totalPrice"></span></div>
                    </div>
                </template>
            </div>
            <button @click="logout()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-xs uppercase mt-6 border border-red-200">Sign Out</button>
        </div>
    </div>

    <!-- Payment Modal -->
    <div x-show="paymentModalOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" @click="paymentModalOpen = false" x-transition.opacity></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-slate-900 uppercase mb-4">Pay Downpayment</h2>
            <div class="p-4 bg-blue-600 text-white rounded-xl mb-4">
                <p class="text-[10px] font-bold uppercase">Total Due Now</p>
                <p class="text-2xl font-black">₱<span x-text="cartDepositTotal"></span></p>
            </div>
            <img src="https://www.image2url.com/r2/default/images/1777388590470-26cd0706-92f7-4a95-b141-0c218a530962.png" class="w-40 h-40 mx-auto rounded-lg mb-4">
            <p class="text-[10px] text-gray-500 text-center mb-4 uppercase font-bold">Screenshot receipt & send to Messenger</p>
            <button @click="confirmAndRedirect()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-sm uppercase">I have paid</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",
            messagingSenderId: "828734198898",
            appId: "1:828734198898:web:e1eed4e9dbfb71ddb29eeb",
            measurementId: "G-KF6ZPXYBKT"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function shop() {
            return {
                isLoading: true,
                cartOpen: false,
                paymentModalOpen: false,
                profileOpen: false,
                searchQuery: '',
                cart: [],
                products: [], 
                myOrders: [],
                isLoadingOrders: false,
                user: null,
                now: new Date().getTime(), 
                showPlanner: false,
                calcSelectedId: null,
                calcInputQty: 1,
                calcFillRate: 100,

                async init() {
                    const inventoryUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv'; 
                    
                    auth.onAuthStateChanged(user => {
                        this.user = user;
                        if (user) this.fetchUserOrders(user.email);
                    });

                    setInterval(() => { this.now = new Date().getTime(); }, 1000);

                    try {
                        const response = await fetch(inventoryUrl);
                        const data = await response.text();
                        this.parseTSV(data);
                    } catch (error) {
                        console.error('Error:', error);
                    } finally {
                        this.isLoading = false;
                    }
                },

                parseTSV(tsvText) {
                    const lines = tsvText.split(/\r?\n/);
                    if (lines.length < 2) return;
                    const headers = lines[0].split('\t').map(h => h.trim());
                    this.products = lines.slice(1).map(line => {
                        const values = line.split('\t');
                        let p = { selectedQty: 1, isCase: false, justAdded: false };
                        headers.forEach((h, i) => {
                            let v = values[i]?.trim();
                            if (h === 'preorderDeadline') p.deadline = v ? new Date(v).getTime() : null;
                            else if (['id', 'price', 'unitsPerCase'].includes(h)) p[h] = Number(v) || 0;
                            else if (h === 'soldOut') p[h] = (v?.toUpperCase() === 'TRUE');
                            else p[h] = v;
                        });
                        return p;
                    }).filter(p => p.id);
                    if (this.products.length > 0) this.calcSelectedId = this.products[0].id;
                },

                async fetchUserOrders(email) {
                    this.isLoadingOrders = true;
                    const ordersUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0ppVCxJ3iyRtvhuVSbONCzFFx6g4nU-dpEHWx_FiSSCMJA6rdK0r5C1AeEP_13f_-Q77VL-6ggybF/pub?gid=0&single=true&output=tsv';
                    try {
                        const res = await fetch(ordersUrl);
                        const data = await res.text();
                        const lines = data.split(/\r?\n/);
                        const headers = lines[0].split('\t').map(h => h.trim());
                        this.myOrders = lines.slice(1).map(line => {
                            const values = line.split('\t');
                            let obj = {};
                            headers.forEach((h, i) => obj[h] = values[i]?.trim());
                            return obj;
                        }).filter(o => o.email?.toLowerCase() === email.toLowerCase());
                    } catch (e) { console.error(e); } finally { this.isLoadingOrders = false; }
                },

                loginWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                logout() { auth.signOut().then(() => { this.user = null; this.profileOpen = false; }); },

                calculateLiveDeposit(p) {
                    const base = p.isCase ? (p.price * p.unitsPerCase) : p.price;
                    return base * 0.3 * (p.selectedQty || 1);
                },

                get calculatedDownpayment() {
                    const p = this.products.find(x => x.id == this.calcSelectedId);
                    if (!p) return 0;
                    return (p.price * this.calcInputQty * 0.3).toLocaleString();
                },

                get filteredProducts() {
                    return this.products.filter(p => p.name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                },

                get cartDepositTotal() {
                    return this.cart.reduce((s, i) => s + (i.depositPrice * i.quantity), 0).toLocaleString();
                },

                get totalItems() { return this.cart.reduce((s, i) => s + i.quantity, 0); },

                addToCart(p) {
                    const price = p.isCase ? (p.price * p.unitsPerCase) : p.price;
                    const existing = this.cart.find(i => i.productId === p.id && i.isCase === p.isCase);
                    if (existing) existing.quantity += p.selectedQty;
                    else this.cart.push({...p, productId: p.id, fullPrice: price, depositPrice: price * 0.3, quantity: p.selectedQty});
                    this.cartOpen = true;
                },

                updateCartQty(idx, n) {
                    this.cart[idx].quantity += n;
                    if (this.cart[idx].quantity <= 0) this.cart.splice(idx, 1);
                },

                getCountdown(d) {
                    if (!d) return "OPEN";
                    const diff = d - this.now;
                    if (diff < 0) return "CLOSED";
                    const days = Math.floor(diff / 86400000);
                    const hrs = Math.floor((diff % 86400000) / 3600000);
                    return `${days}d ${hrs}h left`;
                },

                isExpired(d) { return d && (d - this.now < 0); },
                checkoutSelf() { this.cartOpen = false; this.paymentModalOpen = true; },
                async confirmAndRedirect() { window.open("https://m.me/cratedropcollective", "_blank"); }
            }
        }
    </script>
</body>
</html>
