<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-init="init()" x-cloak>

    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="login()" class="text-[10px] font-bold uppercase bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">Login</button>
                </template>
                <template x-if="user">
                    <div class="flex items-center space-x-3">
                        <img :src="user.photoURL" class="w-8 h-8 rounded-full border-2 border-blue-500">
                        <button @click="logout()" class="text-[10px] font-bold uppercase text-gray-400">Sign Out</button>
                    </div>
                </template>
                <button @click="cartOpen = true" class="bg-blue-600 px-4 py-2 rounded-full flex items-center relative">
                    <i class="fas fa-shopping-cart text-xs mr-2"></i>
                    <span class="font-bold text-xs">₱<span x-text="cartDepositTotal"></span></span>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full" x-text="cart.length"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Search & Planner Toggle -->
    <div class="bg-white border-b sticky top-[68px] z-40 p-4">
        <div class="container mx-auto flex gap-2">
            <input type="text" x-model="searchQuery" placeholder="Search product sets..." class="flex-1 px-4 py-2 bg-gray-100 rounded-xl text-sm outline-none">
            <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider">
                <i class="fas fa-calculator mr-2"></i> Planner
            </button>
        </div>
    </div>

    <!-- Allocation Planner -->
    <section x-show="showPlanner" x-transition class="container mx-auto px-4 mt-4">
        <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h3 class="font-black uppercase text-xs text-blue-600">Allocation Simulator</h3>
                <select x-model.number="calcSelectedId" class="w-full p-2.5 bg-gray-100 rounded-xl text-xs font-bold">
                    <template x-for="item in products" :key="item.id">
                        <option :value="item.id" x-text="item.name"></option>
                    </template>
                </select>
                <div class="flex gap-2">
                    <input type="number" x-model.number="calcQty" class="w-1/2 p-2.5 bg-gray-100 rounded-xl text-xs font-bold">
                    <button @click="calcIsCase = !calcIsCase" class="w-1/2 bg-gray-100 rounded-xl text-[10px] font-black uppercase" :class="calcIsCase ? 'text-blue-600' : ''" x-text="calcIsCase ? 'Case Mode' : 'Unit Mode'"></button>
                </div>
            </div>
            <div class="bg-slate-900 text-white p-6 rounded-2xl flex flex-col justify-center">
                <p class="text-[10px] font-bold uppercase opacity-60">Estimated 30% Downpayment</p>
                <p class="text-3xl font-black">₱<span x-text="calculatedDownpayment"></span></p>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="container mx-auto py-8 px-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <template x-for="product in filteredProducts" :key="product.id">
            <div class="bg-white border rounded-xl overflow-hidden flex flex-col">
                <div class="aspect-square bg-gray-50 flex items-center justify-center p-4 relative">
                    <img :src="product.image" class="max-h-full object-contain">
                    <span class="absolute top-2 left-2 text-[8px] bg-black text-white px-2 py-1 rounded font-black uppercase" x-text="product.type"></span>
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <p class="text-[10px] font-black text-blue-600 uppercase" x-text="product.set"></p>
                    <h2 class="text-sm font-bold h-10 overflow-hidden leading-tight mb-4" x-text="product.name"></h2>
                    
                    <div class="mb-4">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Downpayment (30%)</p>
                        <p class="text-xl font-black">₱<span x-text="Math.floor(product.price * 0.3).toLocaleString()"></span></p>
                    </div>

                    <button @click="addToCart(product)" class="w-full bg-slate-900 text-white py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-blue-600 transition">
                        Add to Crate
                    </button>
                </div>
            </div>
        </template>
    </main>

    <!-- Cart Modal -->
    <div x-show="cartOpen" class="fixed inset-0 z-[60]" x-cloak>
        <div class="absolute inset-0 bg-black/60" @click="cartOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 shadow-2xl flex flex-col">
            <h2 class="text-xl font-black uppercase mb-6">Your Crate</h2>
            <div class="flex-1 overflow-y-auto space-y-4">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex justify-between items-center border-b pb-4">
                        <div>
                            <p class="font-bold text-xs" x-text="item.name"></p>
                            <p class="text-[10px] text-blue-600 font-bold uppercase">DP: ₱<span x-text="item.dp.toLocaleString()"></span></p>
                        </div>
                        <button @click="cart.splice(index, 1)" class="text-red-500 text-xs font-bold">Remove</button>
                    </div>
                </template>
            </div>
            <div class="mt-6 pt-6 border-t">
                <div class="flex justify-between mb-4 font-black">
                    <span>Total DP Due:</span>
                    <span class="text-blue-600">₱<span x-text="cartDepositTotal"></span></span>
                </div>
                <button @click="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-sm">Checkout Order</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",
            messagingSenderId: "828734198898",
            appId: "1:828734198898:web:e1eed4e9dbfb71ddb29eeb",
            measurementId: "G-KF6ZPXYBKT"
        };
        firebase.initializeApp(firebaseConfig);

        function shop() {
            return {
                products: [],
                cart: [],
                user: null,
                searchQuery: '',
                showPlanner: false,
                cartOpen: false,
                calcSelectedId: null,
                calcQty: 1,
                calcIsCase: false,

                async init() {
                    firebase.auth().onAuthStateChanged(user => { this.user = user; });

                    const productTsv = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv';
                    
                    try {
                        const res = await fetch(productTsv);
                        const text = await res.text();
                        this.parseTSV(text);
                    } catch (e) { console.error("TSV Load Error", e); }
                },

                parseTSV(text) {
                    const lines = text.split('\n').filter(l => l.trim());
                    const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
                    this.products = lines.slice(1).map(line => {
                        const cols = line.split('\t');
                        let item = {};
                        headers.forEach((h, i) => { item[h] = cols[i]?.trim(); });
                        item.id = item.id || Math.random();
                        item.price = Number(item.price) || 0;
                        item.unitspercase = Number(item.unitspercase) || 1;
                        return item;
                    });
                    if(this.products.length) this.calcSelectedId = this.products[0].id;
                },

                get filteredProducts() {
                    return this.products.filter(p => p.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || p.set.toLowerCase().includes(this.searchQuery.toLowerCase()));
                },

                get calculatedDownpayment() {
                    const p = this.products.find(x => x.id == this.calcSelectedId);
                    if(!p) return 0;
                    const base = this.calcIsCase ? (p.price * p.unitspercase) : p.price;
                    return (base * this.calcQty * 0.3).toLocaleString();
                },

                get cartDepositTotal() {
                    return this.cart.reduce((sum, item) => sum + item.dp, 0).toLocaleString();
                },

                addToCart(product) {
                    this.cart.push({
                        name: product.name,
                        dp: product.price * 0.3,
                        full: product.price
                    });
                    this.cartOpen = true;
                },

                login() {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    firebase.auth().signInWithPopup(provider);
                },

                logout() { firebase.auth().signOut(); },

                checkout() {
                    if(!this.user) {
                        alert("Please login with Google to complete your order.");
                        return this.login();
                    }
                    const summary = this.cart.map(i => `• ${i.name} (DP: ₱${i.dp})`).join('\n');
                    const message = encodeURIComponent(`🚨 NEW PRE-ORDER\nCustomer: ${this.user.displayName}\n\n${summary}\n\nTotal DP: ₱${this.cartDepositTotal}`);
                    window.open(`https://m.me/cratedropcollective?text=${message}`, '_blank');
                }
            }
        }
    </script>
</body>
</html>
