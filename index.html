<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crate Drop | Simple Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans p-6" x-data="pulseApp()" x-init="getPokemon()">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 border-b border-gray-800 pb-6">
            <h1 class="text-2xl font-bold italic tracking-tighter">CRATE DROP <span class="text-blue-500 underline">PULSE</span></h1>
            <p class="text-gray-400 text-sm mt-2">Real-time market movement. No simulation, just direct data.</p>
        </header>

        <!-- TOP TRENDING (REAL DATA) -->
        <section class="mb-12">
            <h2 class="text-xs font-black uppercase tracking-widest text-blue-500 mb-4">Live Pokémon Momentum (SINGLES)</h2>
            <div class="grid grid-cols-1 gap-3">
                <template x-for="card in pokemonCards">
                    <div class="bg-gray-900 p-4 rounded-lg flex justify-between items-center border border-gray-800">
                        <div>
                            <p class="text-sm font-bold" x-text="card.name"></p>
                            <p class="text-[10px] text-gray-500 uppercase" x-text="card.set"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-blue-400 font-mono font-bold" x-text="'$' + card.price"></p>
                            <a :href="card.url" target="_blank" class="text-[9px] bg-blue-600 px-2 py-1 rounded uppercase font-black hover:bg-blue-500">Check eBay Sold</a>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- SEALED MOMENTUM (ACTION LINKS) -->
        <section>
            <h2 class="text-xs font-black uppercase tracking-widest text-orange-500 mb-4">Sealed Momentum (FACT-CHECK)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <!-- One Piece -->
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                    <h3 class="font-bold mb-1">One Piece: OP-07</h3>
                    <p class="text-xs text-gray-500 mb-4">Filtering: TCG Category Only</p>
                    <a href="https://www.ebay.com/sch/i.html?_nkw=one+piece+op-07+booster+box+sealed&LH_Sold=1&LH_Complete=1&_sacat=183454" target="_blank" class="block text-center bg-white text-black py-2 rounded font-bold text-xs uppercase">View Realized Sales</a>
                </div>

                <!-- Gundam -->
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                    <h3 class="font-bold mb-1">Gundam Card Game</h3>
                    <p class="text-xs text-gray-500 mb-4">Filtering: TCG Category Only</p>
                    <a href="https://www.ebay.com/sch/i.html?_nkw=gundam+war+card+game+booster+box&LH_Sold=1&LH_Complete=1&_sacat=183454" target="_blank" class="block text-center bg-white text-black py-2 rounded font-bold text-xs uppercase">View Realized Sales</a>
                </div>

            </div>
        </section>
    </div>

    <script>
        function pulseApp() {
            return {
                pokemonCards: [],
                async getPokemon() {
                    try {
                        // Fetching actual market winners from the official API
                        const res = await fetch('https://api.pokemontcg.io/v2/cards?q=set.id:sv6&pageSize=5&orderBy=-tcgplayer.prices.holofoil.market');
                        const data = await res.json();
                        this.pokemonCards = data.data.map(c => ({
                            name: c.name,
                            set: c.set.name,
                            price: c.tcgplayer?.prices?.holofoil?.market || c.tcgplayer?.prices?.normal?.market,
                            url: `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(c.name + ' ' + c.number + ' ' + c.set.name)}&LH_Sold=1&LH_Complete=1`
                        }));
                    } catch (e) {
                        console.error("Pokemon API Offline");
                    }
                }
            }
        }
    </script>
</body>
</html>
