<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Pre-orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="shop()" x-cloak>

    <!-- Navigation -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-4">
                <template x-if="!user">
                    <button @click="login()" class="text-[10px] font-black uppercase bg-white/10 px-3 py-2 rounded-lg">Login</button>
                </template>
                <template x-if="user">
                    <div class="flex items-center space-x-2">
                        <button @click="historyOpen = true" class="text-[10px] font-black uppercase text-blue-400">History</button>
                        <img @click="logout()" :src="user.photoURL" class="w-8 h-8 rounded-full border-2 border-blue-500 cursor-pointer">
                    </div>
                </template>
                <button @click="cartOpen = true" class="bg-blue-600 px-4 py-2 rounded-full relative">
                    <i class="fas fa-shopping-cart text-xs"></i>
                    <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-[8px] w-4 h-4 flex items-center justify-center rounded-full border-2 border-black" x-text="totalItems"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Product Grid -->
    <main class="container mx-auto py-6 px-4">
        <div class="flex mb-6 gap-2">
            <input type="text" x-model="searchQuery" placeholder="Search drops..." class="flex-1 p-2 bg-white border rounded-xl text-sm">
            <button @click="showPlanner = !showPlanner" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider">
                Planner
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" x-show="!isLoading">
            <template x-for="product in filteredProducts" :key="product.id">
                <div class="bg-white rounded-xl border p-4 flex flex-col relative">
                    <img :src="product.image" class="h-32 object-contain mb-2">
                    <h2 class="text-xs font-bold mb-2 h-8" x-text="product.name"></h2>
                    <div class="flex bg-gray-100 p-1 rounded-lg mb-2">
                        <button @click="product.isCase = false" :class="!product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md">UNIT</button>
                        <button @click="product.isCase = true" :class="product.isCase ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'" class="flex-1 text-[9px] font-black py-1 rounded-md">CASE</button>
                    </div>
                    <p class="text-sm font-black mb-4">DP: ₱<span x-text="calculateLiveDeposit(product).toLocaleString()"></span></p>
                    <button @click="addToCart(product)" class="w-full bg-slate-900 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Add to Crate</button>
                </div>
            </template>
        </div>
    </main>

    <!-- History Sidebar -->
    <div x-show="historyOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="historyOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase">Order History</h2>
                <button @click="historyOpen = false" class="text-2xl">&times;</button>
            </div>
            <div class="space-y-4">
                <template x-for="order in orderHistory">
                    <div class="bg-gray-50 p-4 rounded-xl border">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-1">
                            <span class="text-gray-400" x-text="'Ref: ' + order.id"></span>
                            <span x-text="order.status" class="text-blue-600"></span>
                        </div>
                        <p class="text-xs font-bold" x-text="order.productName"></p>
                        <p class="text-[10px] mt-2">Paid: ₱<span x-text="order.paidAmount"></span></p>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div x-show="cartOpen" class="fixed inset-0 z-[60]" style="display: none;">
        <div class="absolute inset-0 bg-black/60" @click="cartOpen = false"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6 flex flex-col shadow-2xl">
            <h2 class="text-xl font-black mb-6 uppercase">Your Crate</h2>
            <div class="flex-1 space-y-4 overflow-y-auto">
                <template x-for="(item, index) in cart">
                    <div class="flex justify-between items-center border-b pb-2">
                        <div class="text-xs">
                            <p class="font-bold" x-text="item.name"></p>
                            <p class="text-blue-600" x-text="item.quantity + 'x ' + (item.isCase ? 'CASE' : 'UNIT')"></p>
                        </div>
                        <p class="font-black">₱<span x-text="(item.depositPrice * item.quantity).toLocaleString()"></span></p>
                    </div>
                </template>
            </div>
            <div class="mt-4 pt-4 border-t">
                <div class="flex justify-between font-black text-blue-600 mb-4"><span>Total DP:</span><span>₱<span x-text="cartDepositTotal"></span></span></div>
                <button @click="checkoutSelf()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div x-show="paymentModalOpen" class="fixed inset-0 z-[70]" style="display: none;">
        <div class="absolute inset-0 bg-black/80" @click="paymentModalOpen = false"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md bg-white rounded-2xl p-6 text-center">
            <h2 class="text-xl font-black mb-4 uppercase">Instapay Payment</h2>
            <img src="https://www.image2url.com/r2/default/images/1777388590470-26cd0706-92f7-4a95-b141-0c218a530962.png" class="w-48 h-48 mx-auto mb-4">
            <p class="text-lg font-black text-blue-600 mb-6">Total: ₱<span x-text="cartDepositTotal"></span></p>
            <button @click="confirmAndRedirect()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black uppercase">I've Paid - Confirm Order</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDgULz07vRUdWPKj-BNNmSNd3tJ-AoO3zE",
            authDomain: "crate-drop-portal.firebaseapp.com",
            projectId: "crate-drop-portal",
            storageBucket: "crate-drop-portal.firebasestorage.app",
            messagingSenderId: "828734198898",
            appId: "1:828734198898:web:e1eed4e9dbfb71ddb29eeb"
        };
        firebase.initializeApp(firebaseConfig);

        // --- PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwtF2ahJYvV8QPEGcCVgT2Nof29BTCk1jW47HoAV2qhANYO0Ig6F63BWh9Ycq21xs6Q/exec'; 

        function shop() {
            return {
                isLoading: true,
                cartOpen: false,
                historyOpen: false,
                paymentModalOpen: false,
                searchQuery: '',
                cart: [],
                products: [], 
                user: null,
                orderHistory: [],
                now: new Date().getTime(),

                async init() {
                    const inventoryUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSQBLjsB__nTteTD8pPY7wvfQEQUCqLstkfUb8lgfOV_NpVwraiUU07VxZrKyWsmVPE1vyLtv_6ED9Y/pub?gid=0&single=true&output=tsv';
                    firebase.auth().onAuthStateChanged(user => {
                        this.user = user;
                        if(user) this.fetchUserHistory();
                    });
                    try {
                        const res = await fetch(inventoryUrl);
                        const data = await res.text();
                        this.parseTSV(data);
                    } catch (e) { console.error(e); }
                    finally { this.isLoading = false; }
                },

                parseTSV(text) {
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    const headers = lines[0].split('\t').map(h => h.trim());
                    this.products = lines.slice(1).map(line => {
                        const values = line.split('\t');
                        let p = { selectedQty: 1, isCase: false };
                        headers.forEach((h, i) => {
                            let val = values[i] ? values[i].trim() : '';
                            if (['id', 'price', 'unitsPerCase'].includes(h)) p[h] = Number(val) || 0;
                            else p[h] = val;
                        });
                        return p;
                    });
                },

                async fetchUserHistory() {
                    const historyUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0ppVCxJ3iyRtvhuVSbONCzFFx6g4nU-dpEHWx_FiSSCMJA6rdK0r5C1AeEP_13f_-Q77VL-6ggybF/pub?gid=0&single=true&output=tsv';
                    try {
                        const res = await fetch(historyUrl + '&cachebust=' + Date.now());
                        const text = await res.text();
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        const headers = lines[0].split('\t').map(h => h.trim());
                        const userEmail = this.user.email.toLowerCase();
                        
                        this.orderHistory = lines.slice(1).map(line => {
                            const values = line.split('\t');
                            let row = {};
                            headers.forEach((h, i) => row[h] = values[i]);
                            return row;
                        }).filter(row => row.email?.toLowerCase() === userEmail)
                          .map(row => ({
                              id: row.orderId,
                              productName: row.productName,
                              status: row.status,
                              paidAmount: row.depositPaid
                          }));
                    } catch (e) { console.error(e); }
                },

                async confirmAndRedirect() {
                    if (!this.user) return alert("Please login first!");
                    
                    // 1. Prepare data for Google Sheet
                    const orderData = this.cart.map(item => ({
                        email: this.user.email,
                        orderId: 'CD-' + Date.now().toString().slice(-6),
                        productName: `${item.name} (${item.isCase ? 'CASE' : 'UNIT'})`,
                        depositPaid: (item.depositPrice * item.quantity).toString(),
                        status: 'Pending Verification'
                    }));

                    // 2. SEND TO GOOGLE APPS SCRIPT
                    try {
                        await fetch(scriptURL, {
                            method: 'POST',
                            mode: 'no-cors', // Essential for Apps Script
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderData)
                        });
                    } catch (e) { console.warn("Background sync delay, opening Messenger..."); }

                    // 3. COPY SUMMARY & REDIRECT
                    let summary = "📦 NEW ORDER CONFIRMED\n";
                    this.cart.forEach(i => summary += `• ${i.quantity}x ${i.name}\n`);
                    summary += `Total DP: ₱${this.cartDepositTotal}`;
                    await navigator.clipboard.writeText(summary);
                    
                    this.paymentModalOpen = false;
                    this.cart = [];
                    alert("Order logged! Redirecting to Messenger to send your proof of payment.");
                    window.open("https://m.me/cratedropcollective", "_blank");
                },

                login() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); },
                logout() { firebase.auth().signOut(); },
                calculateLiveDeposit(p) {
                    const base = p.isCase ? (p.price * p.unitsPerCase) : p.price;
                    return base * 0.3;
                },
                get filteredProducts() {
                    return this.products.filter(p => p.name.toLowerCase().includes(this.searchQuery.toLowerCase()));
                },
                get totalItems() { return this.cart.reduce((s, i) => s + i.quantity, 0); },
                get cartDepositTotal() { return this.cart.reduce((sum, item) => sum + (item.depositPrice * item.quantity), 0).toLocaleString(); },
                addToCart(p) {
                    const price = p.isCase ? (p.price * p.unitsPerCase) : p.price;
                    this.cart.push({ ...p, depositPrice: price * 0.3, quantity: 1 });
                },
                checkoutSelf() { this.cartOpen = false; this.paymentModalOpen = true; }
            }
        }
    </script>
</body>
</html>
