<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | Velocity Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-slate-900" x-data="velocityDashboard()" x-cloak>

    <!-- Navigation (Identical to your index.html) -->
    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-y-4">
            <a href="https://cratedropcollective.github.io/" class="flex flex-col hover:opacity-80 transition-opacity">
                <span class="text-lg md:text-xl font-black tracking-tighter leading-none">CRATE DROP</span>
                <span class="text-[10px] font-bold text-blue-500 tracking-[0.2em]">COLLECTIVE</span>
            </a>
            
            <div class="flex items-center space-x-1 md:space-x-3 order-last w-full justify-center md:w-auto md:order-none">
                 <a href="https://cratedropcollective.github.io/" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Home</a>
                 <a href="/products" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Products</a>
                 <a href="/preorder" class="text-[10px] md:text-xs font-bold text-gray-400 hover:text-white uppercase tracking-wider transition-colors px-3 py-1.5 rounded-full hover:bg-white/10">Preorder</a>
                 <a href="#" class="text-[10px] md:text-xs font-bold text-white bg-white/20 px-4 py-1.5 rounded-full uppercase tracking-wider">Velocity</a>
            </div>
            
            <div class="flex items-center space-x-4">
                <a href="/preorder" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full flex items-center transition-all">
                    <span class="font-bold text-[10px] md:text-xs uppercase">Shop Drops</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <div class="bg-white border-b border-gray-200 pt-8 pb-6 px-4">
        <div class="container mx-auto text-center">
            <div class="inline-flex items-center justify-center space-x-2 bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-3 border border-red-100">
                <div class="w-2 h-2 rounded-full bg-red-500 pulse-slow"></div>
                <span>Live Hourly Analytics</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter text-slate-900 mb-2">Hype <span class="text-blue-600">Velocity</span></h1>
            <p class="text-xs md:text-sm text-gray-500 font-medium">See what the community is securing right now. Data shifts hourly based on site traffic and cart additions.</p>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-4">Last Updated: <span x-text="lastUpdated"></span></p>
        </div>
    </div>

    <!-- Dashboard Grid -->
    <main class="container mx-auto py-8 px-2 md:px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <template x-for="(item, index) in trendingData" :key="item.id">
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 relative">
                    
                    <!-- Rank Badge -->
                    <div class="absolute top-0 left-0 w-10 h-10 flex items-center justify-center font-black text-white text-lg rounded-br-2xl z-10 shadow-sm"
                         :class="index === 0 ? 'bg-red-500' : (index === 1 ? 'bg-orange-500' : (index === 2 ? 'bg-blue-500' : 'bg-slate-900'))">
                        #<span x-text="index + 1"></span>
                    </div>

                    <div class="p-5 md:p-6 pt-8">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black text-gray-400 tracking-wider uppercase" x-text="item.setCode"></span>
                                <h2 class="text-lg font-black leading-tight text-slate-900 uppercase" x-text="item.name"></h2>
                            </div>
                            
                            <!-- Trend Icon -->
                            <div class="flex flex-col items-end">
                                <template x-if="item.trend === 'up'">
                                    <div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-sm shadow-sm">
                                        <i class="fas fa-arrow-up"></i>
                                    </div>
                                </template>
                                <template x-if="item.trend === 'down'">
                                    <div class="w-8 h-8 rounded-full bg-red-100 text-red-500 flex items-center justify-center text-sm shadow-sm">
                                        <i class="fas fa-arrow-down"></i>
                                    </div>
                                </template>
                                <template x-if="item.trend === 'stable'">
                                    <div class="w-8 h-8 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center text-sm shadow-sm">
                                        <i class="fas fa-minus"></i>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Main Stats -->
                        <div class="grid grid-cols-2 gap-3 mb-5">
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">Carts / Hr</p>
                                <p class="text-2xl font-black text-slate-900"><span x-text="item.unitsHr"></span> <i class="fas fa-shopping-basket text-sm text-gray-300 ml-1"></i></p>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-wider mb-1">Hype Index</p>
                                <p class="text-2xl font-black" :class="item.hypeScore >= 80 ? 'text-red-500' : 'text-blue-600'"><span x-text="item.hypeScore"></span><span class="text-sm">/100</span></p>
                            </div>
                        </div>

                        <!-- Heat Meter -->
                        <div class="w-full">
                            <div class="flex justify-between text-[8px] font-bold text-gray-400 uppercase mb-1">
                                <span>Cold</span>
                                <span>Trending</span>
                                <span>Selling Out</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden flex">
                                <div class="h-2.5 rounded-full transition-all duration-1000 ease-out" 
                                     :class="item.hypeScore >= 80 ? 'bg-gradient-to-r from-orange-500 to-red-500' : (item.hypeScore >= 50 ? 'bg-gradient-to-r from-blue-400 to-blue-600' : 'bg-gray-400')"
                                     :style="`width: ${item.hypeScore}%`">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function velocityDashboard() {
            return {
                lastUpdated: '',
                // Add or remove sets here. 'baseHype' determines their average popularity.
                sets: [
                    { id: 1, name: 'Surging Sparks', setCode: 'SV08', baseHype: 88 },
                    { id: 2, name: 'Stellar Crown', setCode: 'SV07', baseHype: 65 },
                    { id: 3, name: 'Twilight Masquerade', setCode: 'SV06', baseHype: 70 },
                    { id: 4, name: 'Temporal Forces', setCode: 'SV05', baseHype: 55 },
                    { id: 5, name: 'Paldean Fates', setCode: 'PAF', baseHype: 78 },
                    { id: 6, name: 'Pokémon 151', setCode: 'MEW', baseHype: 95 },
                    { id: 7, name: 'Crown Zenith', setCode: 'CRZ', baseHype: 82 },
                    { id: 8, name: 'Evolving Skies', setCode: 'EVS', baseHype: 98 },
                    { id: 9, name: 'Obsidian Flames', setCode: 'SV03', baseHype: 45 }
                ],
                trendingData: [],
                
                init() {
                    this.calculateVelocity();
                    // Check every minute if the hour has changed to seamlessly update the UI
                    setInterval(() => {
                        this.calculateVelocity();
                    }, 60000); 
                },

                calculateVelocity() {
                    const now = new Date();
                    this.lastUpdated = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    const currentHour = now.getHours();
                    const currentDay = now.getDate();

                    this.trendingData = this.sets.map(set => {
                        // MATH MAGIC: Creates fake but realistic "live" data without a database.
                        // By seeding with the set ID, current day, and hour, the data shifts organically 
                        // every hour, but looks consistent for all users visiting during that same hour.
                        
                        const timeSeed = set.id * currentHour * currentDay;
                        
                        // Creates an organic variance up or down (-15 to +15)
                        const hourlyVariance = Math.floor(Math.sin(timeSeed) * 15); 
                        
                        // Ensure hype stays between 10 and 99
                        let calculatedHype = Math.min(99, Math.max(10, set.baseHype + hourlyVariance));
                        
                        // Fake cart additions based on the hype score
                        let units = Math.max(1, Math.floor((calculatedHype / 100) * 35 + (Math.cos(timeSeed) * 10)));

                        return {
                            ...set,
                            hypeScore: calculatedHype,
                            unitsHr: units,
                            trend: hourlyVariance > 5 ? 'up' : (hourlyVariance < -5 ? 'down' : 'stable')
                        };
                    });

                    // Sort by highest hype score to put the hottest sets at the top
                    this.trendingData.sort((a, b) => b.hypeScore - a.hypeScore);
                }
            }
        }
    </script>
</body>
</html>
